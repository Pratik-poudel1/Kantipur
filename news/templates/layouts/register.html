<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register | Kantipur</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'style.css' %}" />

    <style>
        /* ==== Background with moving overlay ==== */
        .auth-container {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: url("https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=2070") center/cover no-repeat;
            overflow: hidden;
        }

        .auth-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }

        .auth-container::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(270deg, rgba(13, 110, 253, 0.15), rgba(255, 255, 255, 0.05));
            animation: moveGradient 8s infinite linear;
            z-index: 1;
        }

        @keyframes moveGradient {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        /* ==== Glass Card ==== */
        .auth-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out;
            color: white;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==== Header ==== */
        .auth-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(45deg, #0d6efd, #1e90ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .auth-title {
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
        }

        /* ==== Form ==== */
        .auth-body {
            padding: 30px;
        }

        label {
            color: rgba(255, 255, 255, 0.8);
        }

        ::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
            color: white;
        }

        /* ==== Button with Glow Effect ==== */
        .btn-success {
            background: linear-gradient(45deg, #0d6efd, #1e90ff);
            border: none;
            transition: all 0.3s ease-in-out;
            position: relative;
            overflow: hidden;
            color: white;
            font-weight: 600;
        }

        .btn-success::after {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }

        .btn-success:hover::after {
            left: 100%;
        }

        .btn-success:hover {
            box-shadow: 0 0 20px rgba(13, 110, 253, 0.6);
            background: linear-gradient(45deg, #0b5ed7, #187bcd);
        }

        /* ==== Links ==== */
        a {
            color: #0d6efd;
            font-weight: 600;
            transition: color 0.3s;
            text-decoration: none;
        }

        a:hover {
            color: #1e90ff;
            text-decoration: underline;
        }

        /* Additional text styling */
        .password-info {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }

        .form-check-label {
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">Kantipur</div>
                <h3 class="auth-title">Create Your Account</h3>
            </div>
            <div class="auth-body">
                <form method="post">
                    {% csrf_token %}

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_username" class="form-label"><i class="fas fa-user me-2"></i>Username</label>
                            <input type="text" name="username" class="form-control" id="id_username"
                                placeholder="Choose a username" required />
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="id_email" class="form-label"><i class="fas fa-envelope me-2"></i>Email
                                Address</label>
                            <input type="email" name="email" class="form-control" id="id_email"
                                placeholder="your@email.com" required />
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="id_password1" class="form-label"><i
                                    class="fas fa-lock me-2"></i>Password</label>
                            <input type="password" name="password1" class="form-control" id="id_password1"
                                placeholder="Create password" required />
                        </div>

                        <div class="col-md-6 mb-4">
                            <label for="id_password2" class="form-label"><i class="fas fa-lock me-2"></i>Confirm
                                Password</label>
                            <input type="password" name="password2" class="form-control" id="id_password2"
                                placeholder="Confirm password" required />
                        </div>
                    </div>

                    <div class="mb-4 password-info">
                        <p class="mb-1">
                            <i class="fas fa-info-circle me-2"></i> Your password must contain:
                        </p>
                        <ul class="ps-4">
                            <li>At least 8 characters</li>
                            <li>At least one uppercase letter</li>
                            <li>At least one number</li>
                        </ul>
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" id="terms" required />
                        <label class="form-check-label" for="terms">
                            I agree to the
                            <a href="{% url 'terms_of_service' %}" class="">Terms of Service</a> and
                            <a href="{% url 'privacy_policy' %}" class="">Privacy Policy</a>
                        </label>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="fas fa-user-plus me-2"></i> Create Account
                        </button>
                    </div>

                    <div class="text-center mt-4">
                        <p>
                            Already have an account?
                            <a href="{% url 'login' %}">Login here</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
