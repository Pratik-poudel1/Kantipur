{% extends "base_auth.html" %}
{% block title %}Set New Password | Kantipur{% endblock %}
{% block header %}Set New Password{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="d-grid mt-3">
        <button class="btn btn-primary btn-lg" type="submit">
            <i class="fas fa-key me-2"></i> Reset Password
        </button>
    </div>
</form>
<p class="mt-3 text-center">
    <a href="{% url 'login' %}" class="text-link"><i class="fas fa-sign-in-alt me-1"></i> Back to login</a>
</p>
{% endblock %}
